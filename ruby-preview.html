<!doctype html><meta charset="utf-8"><title>讀音注記對照</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--ink:#f3efff;--ink-dim:#b9a8e8;--font-body:'Noto Sans TC',sans-serif}
body{background:#1a0f3a;color:var(--ink);font-family:var(--font-body);padding:28px;margin:0}
.grid{display:flex;flex-wrap:wrap;gap:14px}
.box{background:rgba(46,27,92,.72);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:18px 22px;min-width:140px;text-align:center}
.lang{font-size:10px;color:#8577b4;margin-bottom:14px;letter-spacing:.06em}
.big{font-size:42px;font-weight:800}
h2{font-size:14px;color:#b9a8e8;margin:0 0 14px;font-weight:700}
.rw{display:inline-flex;flex-direction:column;align-items:center;line-height:1.05}
.rw-line{display:inline-flex;align-items:center;justify-content:center}
.rw-u{display:inline-flex;align-items:center}
.rw-ch{white-space:nowrap}
.rw-zy{writing-mode:vertical-lr;text-orientation:upright;font-size:.3em;line-height:1.02;letter-spacing:-.02em;margin-left:.06em;color:var(--ink-dim);font-weight:600;font-family:var(--font-body)}
.rw-sub{margin-top:.16em;font-size:.34em;letter-spacing:.02em;color:var(--ink-dim);font-weight:700;font-family:var(--font-body);white-space:nowrap}
</style>
<h2>讀音注記 — 繁中注音直排在右、其餘橫排在下、英文不標</h2>
