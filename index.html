<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>喊名對決 · Name Duel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#140c2b; --bg-1:#231150; --bg-2:#180d38;
  --surface:rgba(46,27,92,.72); --surface-2:rgba(58,36,112,.7); --line:rgba(255,255,255,.10);
  --ink:#f3efff; --ink-dim:#b6a9df; --ink-faint:#8577b4;
  --amber:#ffb340; --amber-2:#ff8f3c; --amber-soft:rgba(255,179,64,.15);
  --cyan:#33e0d0; --cyan-2:#22c3d6; --cyan-soft:rgba(51,224,208,.13);
  --gold:#ffd166; --pink:#ff5c8a; --green:#5ee1a0; --danger:#ff6b6b;
  --radius:18px; --radius-sm:11px;
  --font-body:'Noto Sans TC',-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei","Hiragino Sans","Yu Gothic","Meiryo","Malgun Gothic","Noto Sans JP","Noto Sans KR",sans-serif;
  --font-disp:'Space Grotesk','Noto Sans TC',var(--font-body);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:var(--font-body); color:var(--ink); line-height:1.5;
  background:
    radial-gradient(120% 80% at 15% -10%, rgba(255,143,60,.18), transparent 55%),
    radial-gradient(120% 90% at 90% 110%, rgba(51,224,208,.16), transparent 55%),
    linear-gradient(160deg,var(--bg-1),var(--bg-0) 55%,var(--bg-2));
  background-attachment:fixed; min-height:100dvh;
  -webkit-font-smoothing:antialiased;
}
#app{max-width:520px;margin:0 auto;padding:20px 16px 40px;min-height:100dvh;display:flex;flex-direction:column}
button{font-family:inherit;cursor:pointer;border:none;color:inherit}
input{font-family:inherit}
.hidden{display:none !important}

/* ---------- typography / bits ---------- */
.eyebrow{font:700 12px/1 var(--font-disp);letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint)}
.h1{font:900 30px/1.08 var(--font-body);letter-spacing:-.01em;margin:6px 0 2px}
.dim{color:var(--ink-dim)}
.faint{color:var(--ink-faint)}
.center{text-align:center}
.num{font-family:var(--font-disp);font-variant-numeric:tabular-nums}

/* ---------- brand ---------- */
.brand{display:flex;justify-content:center;align-items:center;margin:2px 0 12px}
.settings-toggle{display:flex;align-items:center;justify-content:space-between;width:100%;margin-top:14px;padding:12px 14px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;color:var(--ink);font:700 14px/1 var(--font-body);cursor:pointer}
.settings-toggle:hover{background:rgba(255,255,255,.07)}
.settings-toggle .chev{color:var(--ink-faint);font-size:12px}
.settings-body{margin-top:12px;padding-top:14px;border-top:1px solid var(--line)}
.brand .mark{
  width:46px;height:46px;border-radius:14px;flex:0 0 auto;display:grid;place-items:center;
  background:linear-gradient(140deg,var(--amber),var(--pink) 130%);
  box-shadow:0 8px 26px -8px rgba(255,143,60,.7), inset 0 0 0 1px rgba(255,255,255,.18);
  font:900 22px var(--font-body);color:#2a0f2e;position:relative;overflow:hidden
}
.brand .mark::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 40%,rgba(255,255,255,.35) 50%,transparent 60%);transform:translateX(-120%);animation:sheen 4.5s ease-in-out infinite}
@keyframes sheen{0%,60%{transform:translateX(-120%)}80%,100%{transform:translateX(120%)}}
.brand .n{font:900 24px/1 var(--font-body);text-align:center}
.brand .t{font:600 12px/1.3 var(--font-disp);letter-spacing:.16em;color:var(--ink-faint);text-transform:uppercase;margin-top:3px}

/* ---------- cards / panels ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;backdrop-filter:blur(10px);box-shadow:0 20px 50px -30px rgba(0,0,0,.8)}
.card + .card{margin-top:14px}
.stack{display:flex;flex-direction:column;gap:12px}
.grow{flex:1}
.spread{display:flex;align-items:center;justify-content:space-between;gap:10px}
.row{display:flex;gap:10px;align-items:center}
.wrap{flex-wrap:wrap}

/* ---------- form ---------- */
label.f{display:block;font:700 12px/1 var(--font-disp);letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 8px 2px}
.inp{width:100%;background:rgba(10,6,26,.55);border:1px solid var(--line);border-radius:var(--radius-sm);color:var(--ink);padding:14px 14px;font-size:16px;transition:border-color .15s,box-shadow .15s;outline:none}
.inp:focus{border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-soft)}
.inp::placeholder{color:var(--ink-faint)}
.hint{font-size:12.5px;color:var(--ink-faint);margin-top:7px;margin-left:2px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:15px 18px;border-radius:var(--radius-sm);font-weight:700;font-size:15.5px;transition:transform .08s,filter .15s,background .15s;width:100%}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-primary{background:linear-gradient(135deg,var(--amber),var(--amber-2));color:#2a0f10;box-shadow:0 12px 30px -12px rgba(255,143,60,.8)}
.btn-primary:hover:not(:disabled){filter:brightness(1.06)}
.btn-cyan{background:linear-gradient(135deg,var(--cyan),var(--cyan-2));color:#062a2a;box-shadow:0 12px 30px -12px rgba(51,224,208,.7)}
.btn-ghost{background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--ink)}
.btn-ghost:hover{background:rgba(255,255,255,.08)}
.btn-sm{padding:10px 14px;font-size:13.5px;width:auto}
.btn-danger{background:rgba(255,107,107,.12);border:1px solid rgba(255,107,107,.35);color:#ffb3b3}

/* ---------- pills (language) ---------- */
.pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{padding:9px 13px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.03);font-size:13.5px;font-weight:700;color:var(--ink-dim);transition:all .12s;user-select:none}
.pill[aria-pressed="true"]{background:var(--amber-soft);border-color:var(--amber);color:var(--amber)}
.pill.small{padding:6px 10px;font-size:12px}

/* ---------- room list ---------- */
.roomlist{display:flex;flex-direction:column;gap:10px}
.roomitem{display:flex;align-items:center;gap:12px;padding:14px;border-radius:var(--radius-sm);background:rgba(255,255,255,.03);border:1px solid var(--line);transition:border-color .15s,background .15s}
.roomitem:hover{border-color:rgba(255,179,64,.4);background:rgba(255,179,64,.05)}
.roomitem .ri-main{flex:1;min-width:0}
.roomitem .ri-name{font-weight:700;font-size:15.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:7px}
.roomitem .ri-sub{font-size:12.5px;color:var(--ink-faint);margin-top:2px;font-family:var(--font-disp)}
.tag-lock{font-size:11px}
.empty{padding:26px 16px;text-align:center;color:var(--ink-faint);font-size:14px;border:1px dashed var(--line);border-radius:var(--radius-sm)}

/* ---------- player roster (waiting) ---------- */
.plist{display:flex;flex-direction:column;gap:8px}
.pchip{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:var(--radius-sm);background:rgba(255,255,255,.03);border:1px solid var(--line)}
.pav{width:38px;height:38px;border-radius:11px;flex:0 0 auto;display:grid;place-items:center;font-weight:900;font-size:17px;background:linear-gradient(140deg,rgba(255,179,64,.25),rgba(255,92,138,.22));color:var(--ink);border:1px solid rgba(255,255,255,.14)}
.pchip .pn{font-weight:700;font-size:15px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{font:700 10.5px/1 var(--font-disp);letter-spacing:.08em;padding:5px 8px;border-radius:7px;text-transform:uppercase}
.badge.host{background:var(--amber-soft);color:var(--amber);border:1px solid rgba(255,179,64,.4)}
.badge.you{background:rgba(51,224,208,.14);color:var(--cyan);border:1px solid rgba(51,224,208,.35)}
.badge.done{background:rgba(94,225,160,.14);color:var(--green);border:1px solid rgba(94,225,160,.35)}
.badge.wait{background:rgba(255,255,255,.05);color:var(--ink-faint);border:1px solid var(--line)}

/* ---------- reveal grid ---------- */
.revealgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.namecard{padding:15px 13px;border-radius:var(--radius-sm);background:linear-gradient(160deg,var(--surface-2),rgba(20,12,43,.6));border:1px solid var(--line);text-align:center;animation:pop .4s cubic-bezier(.2,1.3,.5,1) both}
.namecard .who{font-size:12px;color:var(--ink-faint);margin-bottom:7px;display:flex;align-items:center;justify-content:center;gap:6px}
.namecard .gn{font-weight:900;font-size:22px;letter-spacing:-.01em;word-break:break-word}
.namecard .lg{font:600 11px var(--font-disp);letter-spacing:.1em;color:var(--ink-faint);margin-top:6px;text-transform:uppercase}
@keyframes pop{from{opacity:0;transform:scale(.85) translateY(8px)}to{opacity:1;transform:none}}

/* ---------- big countdown ---------- */
.bigcount{font:700 84px/1 var(--font-disp);text-align:center;background:linear-gradient(180deg,#fff,var(--amber));-webkit-background-clip:text;background-clip:text;color:transparent;animation:cpulse .9s ease-out}
@keyframes cpulse{from{transform:scale(1.5);opacity:.2}to{transform:scale(1);opacity:1}}
.ring{position:relative;width:150px;height:150px;margin:6px auto}
.ring svg{transform:rotate(-90deg)}
.ring .rt{position:absolute;inset:0;display:grid;place-items:center;font:700 44px var(--font-disp)}

/* ---------- duel stage ---------- */
.stage{position:relative;margin:8px 0 6px}
.plates{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.vs{font:700 26px var(--font-disp);color:var(--ink-faint);letter-spacing:.05em;text-shadow:0 0 20px rgba(255,255,255,.15)}
.plate{perspective:900px;height:132px}
.plate .inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,1.1,.5,1)}
.plate.revealed .inner{transform:rotateY(180deg)}
.pf{position:absolute;inset:0;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden;border:1px solid var(--line);padding:10px;text-align:center}
.pf-back{font:900 46px var(--font-disp);color:var(--ink-faint);background:linear-gradient(160deg,var(--surface-2),rgba(20,12,43,.7))}
.pf-front{transform:rotateY(180deg)}
.plate .gn{font-weight:900;font-size:24px;word-break:break-word;line-height:1.1}
.plate .lg{font:600 10.5px var(--font-disp);letter-spacing:.1em;color:var(--ink-faint);margin-top:6px;text-transform:uppercase}
.plate .tag{font-size:11px;color:var(--ink-faint);margin-bottom:5px}
.plate.a .pf-front{background:linear-gradient(160deg,rgba(255,179,64,.22),rgba(255,143,60,.12));box-shadow:inset 0 0 0 1px rgba(255,179,64,.45)}
.plate.b .pf-front{background:linear-gradient(160deg,rgba(51,224,208,.2),rgba(34,195,214,.1));box-shadow:inset 0 0 0 1px rgba(51,224,208,.45)}
.plate.a .gn{color:#ffdca6}
.plate.b .gn{color:#b7f6ee}
.plate.active .inner{box-shadow:0 0 0 2px rgba(255,255,255,.15),0 18px 40px -14px rgba(0,0,0,.7)}
.plate.win .pf-front{box-shadow:inset 0 0 0 2px var(--gold),0 0 34px -4px rgba(255,209,102,.55);animation:winpop .5s cubic-bezier(.2,1.4,.4,1)}
@keyframes winpop{from{transform:scale(.9)}to{transform:scale(1)}}
.stage .spot{position:absolute;top:-30px;left:50%;transform:translateX(-50%);width:260px;height:200px;border-radius:50%;filter:blur(30px);opacity:.5;pointer-events:none;z-index:-1;background:radial-gradient(circle,rgba(255,179,64,.35),transparent 70%)}

.duelcount{position:absolute;inset:0;display:grid;place-items:center;z-index:3;pointer-events:none}
.duelcount span{font:700 76px var(--font-disp);background:linear-gradient(180deg,#fff,var(--amber));-webkit-background-clip:text;background-clip:text;color:transparent;animation:cpulse .85s ease-out}

/* ---------- speak panel ---------- */
.speak{margin-top:14px;padding:16px;border-radius:var(--radius-sm);text-align:center;background:linear-gradient(160deg,rgba(255,92,138,.12),rgba(46,27,92,.5));border:1px solid rgba(255,92,138,.3)}
.speak .lead{font-size:13px;color:var(--ink-dim);margin-bottom:6px}
.speak .target{font-weight:900;font-size:30px;margin:2px 0 10px;letter-spacing:-.01em;word-break:break-word}
.mic{display:inline-flex;align-items:center;gap:9px;padding:9px 15px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid var(--line);font-size:13px;font-weight:700;color:var(--ink-dim)}
.mic .dot{width:10px;height:10px;border-radius:50%;background:var(--danger);box-shadow:0 0 0 0 rgba(255,107,107,.6);animation:micpulse 1.2s infinite}
@keyframes micpulse{0%{box-shadow:0 0 0 0 rgba(255,107,107,.55)}70%{box-shadow:0 0 0 10px rgba(255,107,107,0)}100%{box-shadow:0 0 0 0 rgba(255,107,107,0)}}
.transcript{margin-top:11px;min-height:22px;font-size:15px;color:var(--ink);font-weight:600;word-break:break-word}
.transcript:empty::before{content:"…聆聽中";color:var(--ink-faint);font-weight:400}
.spectate{margin-top:14px;text-align:center;color:var(--ink-faint);font-size:14px}

.winbanner{margin-top:14px;padding:14px;border-radius:var(--radius-sm);text-align:center;font-weight:800;font-size:16px;background:linear-gradient(135deg,rgba(255,209,102,.18),rgba(255,143,60,.12));border:1px solid rgba(255,209,102,.4);color:var(--gold);animation:pop .4s cubic-bezier(.2,1.3,.5,1) both}
.winbanner.none{background:rgba(255,255,255,.04);border-color:var(--line);color:var(--ink-dim)}

/* ---------- mini roster during duel ---------- */
.miniroster{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-top:14px}
.mini{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-weight:900;font-size:15px;background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--ink-faint);position:relative}
.mini.a{border-color:var(--amber);color:var(--amber);box-shadow:0 0 0 2px var(--amber-soft)}
.mini.b{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 0 2px var(--cyan-soft)}

/* ---------- scoreboard ---------- */
.progress{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.pbar{flex:1;height:7px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden}
.pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--amber),var(--pink));border-radius:99px;transition:width .3s}
.roundlbl{font:700 12px var(--font-disp);letter-spacing:.1em;color:var(--ink-dim);white-space:nowrap}

.scorelist{display:flex;flex-direction:column;gap:8px}
.scorerow{display:flex;align-items:center;gap:11px;padding:12px 13px;border-radius:var(--radius-sm);background:rgba(255,255,255,.03);border:1px solid var(--line)}
.scorerow.top{background:linear-gradient(135deg,rgba(255,209,102,.14),rgba(255,143,60,.07));border-color:rgba(255,209,102,.4)}
.rankn{width:30px;text-align:center;font:700 18px var(--font-disp);color:var(--ink-faint)}
.scorerow.top .rankn{color:var(--gold)}
.scorerow .sn{flex:1;min-width:0}
.scorerow .sn b{font-weight:700;font-size:15px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scorerow .sn small{color:var(--ink-faint);font-size:12px}
.scoreval{font:700 20px var(--font-disp);color:var(--amber)}
.scorerow.top .scoreval{color:var(--gold)}
.medal{font-size:19px}

/* ---------- winner hero ---------- */
.winner-hero{text-align:center;padding:22px 16px 8px}
.winner-hero .crown{font-size:44px;filter:drop-shadow(0 6px 14px rgba(255,209,102,.5))}
.winner-hero .wl{font:700 12px var(--font-disp);letter-spacing:.2em;color:var(--ink-faint);text-transform:uppercase;margin-top:8px}
.winner-hero .wn{font-weight:900;font-size:30px;margin-top:4px;background:linear-gradient(135deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}

/* ---------- misc ---------- */
.divider{height:1px;background:var(--line);margin:16px 0}
.note{font-size:12.5px;color:var(--ink-faint);line-height:1.6}
.kbd{font:600 11px var(--font-disp);padding:2px 6px;border-radius:5px;background:rgba(255,255,255,.07);border:1px solid var(--line)}
details.help{margin-top:14px}
details.help summary{cursor:pointer;font-size:13.5px;color:var(--ink-dim);font-weight:700;list-style:none;padding:8px 2px}
details.help summary::-webkit-details-marker{display:none}
details.help summary::before{content:"▸ ";color:var(--amber)}
details.help[open] summary::before{content:"▾ "}
.badge-mic{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:5px 9px;border-radius:8px}
.badge-mic.ok{background:rgba(94,225,160,.12);color:var(--green);border:1px solid rgba(94,225,160,.3)}
.badge-mic.no{background:rgba(255,107,107,.12);color:#ffb3b3;border:1px solid rgba(255,107,107,.3)}

.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* toasts + conn */
#toasts{position:fixed;left:0;right:0;bottom:18px;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:100;pointer-events:none;padding:0 16px}
.toast{background:rgba(30,18,60,.96);border:1px solid var(--line);border-radius:12px;padding:12px 16px;font-size:14px;font-weight:600;max-width:480px;box-shadow:0 14px 40px -14px rgba(0,0,0,.8);animation:tin .25s ease;backdrop-filter:blur(6px)}
.toast.err{border-color:rgba(255,107,107,.5);color:#ffc9c9}
.toast.ok{border-color:rgba(94,225,160,.5);color:#c9f5df}
@keyframes tin{from{opacity:0;transform:translateY(12px)}to{opacity:1}}
#conn{position:fixed;top:0;left:0;right:0;text-align:center;padding:7px;background:rgba(255,107,107,.9);color:#3a0d0d;font-weight:700;font-size:13px;z-index:200}

@media (prefers-reduced-motion: reduce){*{animation-duration:.001s !important;transition-duration:.05s !important}}
:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
@media(max-width:400px){.h1{font-size:26px}.plate .gn{font-size:20px}}
.pav.pav-xs{width:22px;height:22px;border-radius:7px;font-size:11px}
.pav.pav-sm{width:30px;height:30px;border-radius:9px;font-size:13px}
/* 頭像上傳區（大廳） */
.avwrap{position:relative;flex:0 0 auto;cursor:pointer}
.avwrap .pav{width:52px;height:52px;border-radius:15px}
.avwrap .edit{position:absolute;right:-4px;bottom:-4px;width:22px;height:22px;border-radius:50%;background:var(--cyan);color:#04222b;display:grid;place-items:center;font-size:12px;border:2px solid var(--bg)}
/* 浮動聊天泡泡 + 視窗 */
#chatfab{position:fixed;right:18px;bottom:18px;width:56px;height:56px;border-radius:50%;background:linear-gradient(140deg,var(--amber),var(--pink));color:#2a1400;border:none;box-shadow:0 8px 24px rgba(0,0,0,.4);cursor:pointer;z-index:60;display:none;place-items:center}
#chatfab.show{display:grid}
#chatfab svg{width:26px;height:26px}
#chatfab .unread{position:absolute;top:-2px;right:-2px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;background:#ff4d6d;color:#fff;font:700 11px/18px var(--font-body);text-align:center;border:2px solid var(--bg)}
#chatwin{position:fixed;right:18px;bottom:84px;width:min(340px,92vw);height:min(460px,70vh);background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 16px 50px rgba(0,0,0,.5);z-index:61;display:none;flex-direction:column;overflow:hidden}
#chatwin.show{display:flex}
.chat-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:rgba(255,255,255,.05);border-bottom:1px solid var(--line);cursor:move;user-select:none;touch-action:none}
.chat-head .ttl{font:800 14px/1 var(--font-body)}
.chat-head button{background:none;border:none;color:var(--ink-faint);font-size:20px;cursor:pointer;line-height:1;padding:2px 6px}
.chat-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px}
.chat-empty{margin:auto;color:var(--ink-faint);font-size:13px;text-align:center}
.cmsg{display:flex;gap:8px;align-items:flex-end;max-width:88%}
.cmsg.me{align-self:flex-end;flex-direction:row-reverse}
.cmsg .pav{width:26px;height:26px;border-radius:8px;flex:0 0 auto}
.cmsg .bub{background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:13px;padding:7px 11px;font-size:14px;word-break:break-word}
.cmsg.me .bub{background:linear-gradient(140deg,rgba(51,224,208,.22),rgba(34,195,214,.12));border-color:rgba(51,224,208,.4)}

const DEFAULT_AVATAR = 'data:image/svg+xml;utf8,' + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23e3e5ea"/><circle cx="50" cy="38" r="19" fill="%23a9adb6"/><path d="M14 92c0-21 17-32 36-32s36 11 36 32z" fill="%23a9adb6"/></svg>'.replace(/%23/g,'#')

// 把上傳的圖片壓成 size 見方的 JPEG dataURL
function compressImage(file, size, quality){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      try {
        const c = document.createElement('canvas'); c.width=size; c.height=size;
        const ctx = c.getContext('2d');
        const s = Math.min(img.width, img.height);
        const sx = (img.width - s)/2, sy = (img.height - s)/2;
        ctx.drawImage(img, sx, sy, s, s, 0, 0, size, size);
        URL.revokeObjectURL(url);
        resolve(c.toDataURL('image/jpeg', quality));
      } catch(e){ reject(e); }
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); reject(new Error('img')); };
    img.src = url;
  });
}
// 聊天圖片：等比縮到最長邊 maxW，輸出 JPEG dataURL
function compressChatImage(file, maxW, quality){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      try {
        let w=img.width, h=img.height;
        if (Math.max(w,h) > maxW){ const r = maxW/Math.max(w,h); w=Math.round(w*r); h=Math.round(h*r); }
        const c = document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        resolve(c.toDataURL('image/jpeg', quality));
      } catch(e){ reject(e); }
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); reject(new Error('img')); };
    img.src = url;
  });
}
async function doUploadAvatar(file){
  if (!file) return;
  try {
    let data = await compressImage(file, 96, 0.72);
    // 若還是偏大，降級再壓一次
    if (data.length > 24000) data = await compressImage(file, 72, 0.6);
    S.avatar = data; saveMyAvatarLocal(data); S.avatarCache[S.uid] = data;
    if (FB_OK && S.uid && !String(S.uid).startsWith('local') && !String(S.uid).startsWith('guest')){
      try { await set(ref(db, 'avatars/' + S.uid), data); } catch {}
    }
    toast(T('avatarSet'), 'ok');
    S.lastKey = null; render();
  } catch(e){ toast(T('avatarErr'), 'err'); }
}
// 確保這些 uid 的頭像都在快取（沒有的抓一次），抓到就重繪
function ensureAvatars(uids){
  if (!FB_OK) return;
  const missing = uids.filter(u => u && u!==S.uid && !(u in S.avatarCache));
  if (!missing.length) return;
  missing.forEach(u => { S.avatarCache[u] = null; }); // 佔位避免重複抓
  Promise.all(missing.map(u =>
    get(ref(db, 'avatars/' + u)).then(s => { S.avatarCache[u] = s.exists() ? s.val() : ''; }).catch(()=>{ S.avatarCache[u]=''; })
  )).then(()=>{ S.lastKey = null; render(); });
}
// 回傳頭像 HTML：有自訂圖→<img>，否則預設剪影
function avatarImg(uidOrPlayer, cls){
  const uid = typeof uidOrPlayer === 'string' ? uidOrPlayer : (uidOrPlayer && uidOrPlayer.id);
  const data = (uid && S.avatarCache[uid]) || (uid===S.uid ? S.avatar : '') || '';
  const src = data || DEFAULT_AVATAR;
  return `<span class="pav ${cls||''}" style="overflow:hidden;padding:0"><img src="${src}" alt="" style="width:100%;height:100%;object-fit:cover;display:block"></span>`;
}

function chatPush(obj){
  if (!S.chatRoomId || !FB_OK) return;

function subscribeChat(roomId){
  if (!FB_OK || !roomId || S.chatRoomId === roomId) return;
  unsubscribeChat();
  S.chatRoomId = roomId; S.chatMsgs = []; S.chatUnread = 0; updateUnread(); renderChat();
  const q = query(ref(db, 'chats/' + roomId), limitToLast(50));
  S.chatUnsub = onChildAdded(q, snap => {
    const m = snap.val(); if (!m) return;
    S.chatMsgs.push(m);
    if (S.chatMsgs.length > 80) S.chatMsgs = S.chatMsgs.slice(-80);
    if (m.uid && m.uid!==S.uid && !(m.uid in S.avatarCache)) ensureAvatars([m.uid]);
    renderChat();
    if (!S.chatOpen && m.uid!==S.uid){ S.chatUnread=(S.chatUnread||0)+1; updateUnread(); }
  });
}
function unsubscribeChat(){ if (S.chatUnsub){ try{S.chatUnsub();}catch{} S.chatUnsub=null; } S.chatRoomId=null; S.chatMsgs=[]; }

function renderChat(){
  const body=document.getElementById('chat-body'); if(!body) return;
  const tt=document.getElementById('chat-title'); if(tt) tt.textContent=T('chatTitle');
  const inp=document.getElementById('chat-text'); if(inp) inp.placeholder=T('chatPlaceholder');

  if (!S.chatMsgs.length){ body.innerHTML=`<div class="chat-empty">${T('chatEmpty')}</div>`; return; }
  const nearBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 60;
  body.innerHTML = S.chatMsgs.map(m=>{
    const me = m.uid===S.uid;
    let inner='';
    if (m.type==='image'||m.type==='gif') inner=`<img src="${m.media}" alt="">`;
    else if (m.type==='voice') inner=`<audio controls src="${m.media}"></audio>`;
    else inner=esc(m.text||'');
    return `<div class="cmsg ${me?'me':''}">${avatarImg(m.uid)}<div><div class="nm">${esc(m.nick||'')}</div><div class="bub">${inner}</div></div></div>`;
  }).join('');
  const lastMine = S.chatMsgs[S.chatMsgs.length-1]?.uid === S.uid;
  if (nearBottom || lastMine) body.scrollTop = body.scrollHeight;
}

async function chatStartRec(){
  try {
    let stream = S.micStream;
    if (!stream){ stream = await navigator.mediaDevices.getUserMedia({audio:true}); S.micStream=stream; S.micReady=true; }
    const rec = new MediaRecorder(stream);
    const chunks=[];
    rec.ondataavailable = e=>{ if(e.data&&e.data.size) chunks.push(e.data); };
    rec.onstop = async ()=>{
      try {

function initChatDrag(){
  const head=document.getElementById('chat-head'), win=document.getElementById('chatwin');
  if (!head||!win) return;
  let dragging=false, sx=0, sy=0, ox=0, oy=0;
  head.addEventListener('pointerdown', e=>{
    if (e.target.closest('button')) return;
    dragging=true; win.style.right='auto'; win.style.bottom='auto';
    const r=win.getBoundingClientRect(); ox=r.left; oy=r.top;
    win.style.left=ox+'px'; win.style.top=oy+'px'; sx=e.clientX; sy=e.clientY;
    try{ head.setPointerCapture(e.pointerId); }catch{}
  });
  head.addEventListener('pointermove', e=>{
    if(!dragging) return;
    let nx=ox+(e.clientX-sx), ny=oy+(e.clientY-sy);
    nx=Math.max(4, Math.min(window.innerWidth-win.offsetWidth-4, nx));
    ny=Math.max(4, Math.min(window.innerHeight-win.offsetHeight-4, ny));
    win.style.left=nx+'px'; win.style.top=ny+'px';
  });
  head.addEventListener('pointerup', ()=>{dragging=false;});
  head.addEventListener('pointercancel', ()=>{dragging=false;});
}

function roomCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s=''; for(let i=0;i<4;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

/* 玩家清單（存在即在線；斷線者 onDisconnect 會移除節點） */
function playersArr(room){
  const p = room && room.players ? room.players : {};
  return Object.entries(p).map(([id,v]) => ({ id, ...v }));
}
function expectedHostId(room){
  const arr = playersArr(room);
  if (!arr.length) return null;
  arr.sort((a,b)=>{
    const ja = typeof a.joinedAt==='number'?a.joinedAt:Infinity;
    const jb = typeof b.joinedAt==='number'?b.joinedAt:Infinity;
    if (ja!==jb) return ja-jb;
    return a.id < b.id ? -1 : 1;
  });
  return arr[0].id;
}

/* 循環賽（circle method）分「輪」：每一輪每人各出賽一次（單數則一人輪空，輪空者輪流）。
   以「整輪」為單位取用，任何情況出賽次數都平均（最多差 1），且不會有人被漏掉。 */
function circleWaves(ids){
  let arr = ids.slice();
  if (arr.length % 2 === 1) arr.push(null);   // 補一個「輪空」
  const m = arr.length, waves = [];
  let list = arr.slice();
  for (let r=0; r<m-1; r++){
    const games=[];
    for (let i=0;i<m/2;i++){
      const a=list[i], b=list[m-1-i];
      if (a!==null && b!==null) games.push(Math.random()<.5?{a,b}:{a:b,b:a});
    }
    shuffle(games);
    waves.push(games);
    const fixed=list[0], rest=list.slice(1);
    rest.unshift(rest.pop());                  // 固定第一位，其餘輪轉
    list=[fixed, ...rest];
  }
  return waves;
}
/* 依「每人場數」決定要打幾輪。單數人多打一輪，確保每人都達標。 */
function wavesToUse(n, gamesPer){
  const total = (n%2===0) ? n-1 : n;
  if (!gamesPer || gamesPer<=0) return total;
  return (n%2===0) ? Math.min(total, gamesPer) : Math.min(total, gamesPer+1);
}
/* 一局共幾回合（供顯示） */
function localRoundsPreview(n, gamesPer){
  if (n < 2) return 0;
  return wavesToUse(n, gamesPer) * Math.floor(n/2);
}
/* gamesPer：每人至少對戰場數（0＝全部互相對戰）。保證人人輪得到、次數平均。 */
function buildMatchups(ids, gamesPer){
  const n = ids.length;
  if (n < 2) return [];
  const waves = circleWaves(ids);
  const W = wavesToUse(n, gamesPer);
  const out=[]; let lastA=null, lastB=null;
  for (let i=0;i<W;i++){
    const games = waves[i];
    if (out.length && games.length>1){        // 盡量避免相鄰兩場同一人
      const clash=games.findIndex(g=> g.a!==lastA&&g.b!==lastA&&g.a!==lastB&&g.b!==lastB);
      if (clash>0){ const t=games[0]; games[0]=games[clash]; games[clash]=t; }
    }
    for (const g of games){ out.push(g); lastA=g.a; lastB=g.b; }
  }
  return out;
}

/* 名次（同分同名次，密集排名 1,1,2,3…） */
function rankings(arr){
  const s = arr.slice().sort((x,y)=>(y.score||0)-(x.score||0));
  let rank=0, last=null;
  return s.map(p=>{
    const sc = p.score||0;
    if (sc!==last){ rank++; last=sc; }
    return { ...p, rank };
  });
}

/* 先取得麥克風授權並「保留串流」。瀏覽器只要已授權且串流未關，
   之後每一局的語音辨識就不會再跳權限視窗。回傳是否成功。 */
async function ensureMic(){
  if (S.micReady && S.micStream) return true;
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return false;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    S.micStream = stream; S.micReady = true;
    return true;
  } catch (e){
    S.micReady = false;
    return false;
  }
}
function releaseMic(){
  try { S.micStream && S.micStream.getTracks().forEach(t=>t.stop()); } catch {}
  S.micStream = null; S.micReady = false;
}

class SpeechDuel {
  static supported(){ return 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window; }
  constructor(){ this.rec=null; this.active=false; }
  start(lang, testFn, { onMatch, onText, latch=true }){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return false;
    this.stop();
    const rec = new SR();
    rec.lang = lang || 'zh-TW';
    rec.continuous = true;
    rec.interimResults = true;
    rec.maxAlternatives = 6;
    let done = false;
    rec.onresult = (e)=>{
      if (done) return;
      for (let i=e.resultIndex; i<e.results.length; i++){
        const res = e.results[i];
        let best = res[0] && res[0].transcript || '';
        let matched = false;
        for (let j=0;j<res.length;j++){
          const alt = res[j].transcript || '';
          if (testFn(alt)){
            onText && onText(alt);
            onMatch && onMatch();
            if (latch){ done = true; return; }
            matched = true; break;
          }
        }
        if (!matched) onText && onText(best);
      }
    };
    rec.onerror = (e)=>{
      if (e && (e.error==='not-allowed' || e.error==='service-not-allowed')){
        toast('麥克風權限被拒，請在瀏覽器允許麥克風', 'err');
        this.active=false;
      }
    };
    rec.onend = ()=>{ if (this.active && !done){ try{ rec.start(); }catch{} } };
    this.rec = rec; this.active = true;
    try { rec.start(); } catch {}
    return true;
  }
  stop(){
    this.active=false;
    if (this.rec){ try{ this.rec.onend=null; this.rec.stop(); }catch{} this.rec=null; }
  }
}
function normalize(s){
  return String(s||'')
    .normalize('NFKC')
    .toLowerCase()
    .replace(/[\s\u3000]/g,'')
    .replace(/[.,!?;:'"`~、。，！？；：·「」『』（）()\[\]{}\-—_…]/g,'');
}
function levenshtein(a,b){
  const m=a.length,n=b.length;
  if(!m)return n; if(!n)return m;
  const dp=Array.from({length:m+1},(_,i)=>[i,...new Array(n).fill(0)]);
  for(let j=0;j<=n;j++)dp[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){
    const c=a[i-1]===b[j-1]?0:1;
    dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+c);
  }
  return dp[m][n];
}

const PY2ZH = new Map(), ZH2PY = new Map();
(function(){
  if (!ZHUYIN_RAW || ZHUYIN_RAW.indexOf('%%')===0) return;
  for (const t of ZHUYIN_RAW.split(' ')){
    const idx = t.search(/[^a-z]/);
    if (idx <= 0) continue;
    const p = t.slice(0, idx), z = t.slice(idx);
    PY2ZH.set(p, z);
    if (!ZH2PY.has(z)) ZH2PY.set(z, p);
  }
})();
const ZHKEYS = [...ZH2PY.keys()].sort((a,b)=>b.length-a.length);
function pyToZhuyin(py){ return PY2ZH.get(py) || null; }
function zhuyinToPy(zh){
  zh = String(zh||'').replace(/[ˊˇˋ˙\s]/g,'');
  const out=[]; let i=0;
  while (i < zh.length){
    let hit=null;
    for (const k of ZHKEYS){ if (zh.startsWith(k,i)){ hit=k; break; } }
    if (!hit) return null;
    out.push(ZH2PY.get(hit)); i += hit.length;
  }
  return out;
}

/* 台灣國語音節正規化：唸對「音」就算對，容忍常見發音混用
   平翹舌不分 zh/z、ch/c、sh/s；前後鼻音不分 eng/en、ing/in（聲調一律忽略） */
function canonSyllable(py){
  py = py.replace(/^zh/,'z').replace(/^ch/,'c').replace(/^sh/,'s');
  py = py.replace(/eng$/,'en').replace(/ing$/,'in');
  return py;
}
function canonLatin(s){
  return String(s||'').toLowerCase()
    .replace(/zh/g,'z').replace(/ch/g,'c').replace(/sh/g,'s')
    .replace(/eng/g,'en').replace(/ing/g,'in');
}
/* 中文音節鍵：逐字取拼音→正規化，以空白分隔保留音節邊界
   同音字與台灣發音變體皆互通 */
function phonZh(text){
  const toks=[]; let latin='';
  const flush=()=>{ if(latin){ const n=normalize(latin); if(n) toks.push(canonLatin(n)); latin=''; } };
  for (const ch of String(text||'')){
    const code = ch.codePointAt(0);
    if (code>=0x4E00 && code<=0x9FFF){ flush(); const py=PY.get(ch); toks.push(canonSyllable(py||normalize(ch))); }
    else if (/[a-zA-Z]/.test(ch)){ latin+=ch; }
    else { flush(); }
  }
  flush();
  return toks.join(' ');
}
/* 自訂發音鍵（可為注音、漢字或拼音），同樣以空白分隔音節 */
function readingKeyZh(text){
  text = String(text||'');
  if (/[\u3105-\u312F]/.test(text)){                 // 含注音符號
    const arr = zhuyinToPy(text);
    if (arr) return arr.map(canonSyllable).join(' ');
  }
  if (/[\u4E00-\u9FFF]/.test(text)) return phonZh(text);  // 含漢字
  return text.toLowerCase().trim().split(/\s+/)          // 當拉丁拼音（以空白切音節）
    .map(p=>canonLatin(p.replace(/[^a-z]/g,''))).filter(Boolean).join(' ');
}

/* 韓文羅馬化 */
const KO_CHO=['g','kk','n','d','tt','r','m','b','pp','s','ss','','j','jj','ch','k','t','p','h'];
const KO_JUNG=['a','ae','ya','yae','eo','e','yeo','ye','o','wa','wae','oe','yo','u','wo','we','wi','yu','eu','ui','i'];
const KO_JONG=['','k','k','k','n','n','n','t','l','k','m','l','l','l','p','l','m','p','p','t','t','ng','t','t','k','t','p','t'];
function hangulRoman(text){
  let out='';
  for (const ch of String(text||'')){
    const c=ch.codePointAt(0);
    if (c>=0xAC00 && c<=0xD7A3){
      const s=c-0xAC00, jong=s%28, jung=((s-jong)/28)%21|0, cho=(((s-jong)/28-jung)/21)|0;
      out += KO_CHO[cho]+KO_JUNG[jung]+KO_JONG[jong];
    } else out += ch;
  }
  return out;
}

/* 日文假名→羅馬字 */
const KANA={
 'あ':'a','い':'i','う':'u','え':'e','お':'o',
 'か':'ka','き':'ki','く':'ku','け':'ke','こ':'ko','が':'ga','ぎ':'gi','ぐ':'gu','げ':'ge','ご':'go',
 'さ':'sa','し':'shi','す':'su','せ':'se','そ':'so','ざ':'za','じ':'ji','ず':'zu','ぜ':'ze','ぞ':'zo',
 'た':'ta','ち':'chi','つ':'tsu','て':'te','と':'to','だ':'da','ぢ':'ji','づ':'zu','で':'de','ど':'do',
 'な':'na','に':'ni','ぬ':'nu','ね':'ne','の':'no',
 'は':'ha','ひ':'hi','ふ':'fu','へ':'he','ほ':'ho','ば':'ba','び':'bi','ぶ':'bu','べ':'be','ぼ':'bo','ぱ':'pa','ぴ':'pi','ぷ':'pu','ぺ':'pe','ぽ':'po',
 'ま':'ma','み':'mi','む':'mu','め':'me','も':'mo',
 'や':'ya','ゆ':'yu','よ':'yo',
 'ら':'ra','り':'ri','る':'ru','れ':'re','ろ':'ro',
 'わ':'wa','を':'o','ん':'n','ゔ':'vu',
 'ぁ':'a','ぃ':'i','ぅ':'u','ぇ':'e','ぉ':'o'
};
const KSMALL={'ゃ':'ya','ゅ':'yu','ょ':'yo'};
function kanaRoman(text){
  const s=[...String(text||'')].map(ch=>{ const c=ch.codePointAt(0); return (c>=0x30A1&&c<=0x30F6)?String.fromCodePoint(c-0x60):ch; });
  let out='', gem=false, lastV='';
  for (let i=0;i<s.length;i++){
    const ch=s[i];
    if (ch==='っ'){ gem=true; continue; }
    if (ch==='ー'||ch==='〜'){ out+=lastV; continue; }
    let r=KANA[ch];
    if (r===undefined){ out+=ch; lastV=''; gem=false; continue; }
    const nx=s[i+1];
    if (nx && KSMALL[nx]){
      if (r==='shi') r='sh'+KSMALL[nx].slice(1);
      else if (r==='chi') r='ch'+KSMALL[nx].slice(1);
      else if (r==='ji') r='j'+KSMALL[nx].slice(1);
      else if (r.endsWith('i')) r=r.slice(0,-1)+KSMALL[nx];
      else r=r+KSMALL[nx];
      i++;
    }
    if (gem){ r=(r[0]||'')+r; gem=false; }
    out+=r; lastV=r.slice(-1);
  }
  return out;
}

/* 英文近音碼 */
function enPhon(text){
  let s=String(text||'').toLowerCase().replace(/[^a-z]/g,'');
  if(!s) return '';
  const rep=[[/ph/g,'f'],[/gh/g,'f'],[/ck/g,'k'],[/sch/g,'sk'],[/sh/g,'S'],[/ch/g,'C'],
    [/th/g,'T'],[/wh/g,'w'],[/wr/g,'r'],[/kn/g,'n'],[/qu/g,'kw'],[/q/g,'k'],[/x/g,'ks'],
    [/c([eiy])/g,'s$1'],[/c/g,'k'],[/z/g,'s'],[/y/g,'i']];
  for (const [a,b] of rep) s=s.replace(a,b);
  s=s.replace(/(.)\1+/g,'$1');   // 疊字合併
  return s.toLowerCase();
}

function phon(text, lang){
  if (lang==='zh-TW'||lang==='zh-CN') return phonZh(text);
  if (lang==='ko-KR') return normalize(hangulRoman(text));
  if (lang==='ja-JP') return normalize(kanaRoman(text));
  return enPhon(text);
}
function toRomanGeneric(text){ return normalize(kanaRoman(hangulRoman(toPinyin(text)))); }
function readingKey(text, lang){
  if (lang==='zh-TW'||lang==='zh-CN') return readingKeyZh(text);
  if (lang==='en-US') return enPhon(text);
  return toRomanGeneric(text);
}

/* 顯示用（可編輯的建議發音）：繁中→注音，簡中→拼音 */
function computeReading(text, lang){
  text=String(text||'');
  if (!text) return '';
  if (lang==='zh-TW'){
    const out=[]; for (const ch of text){ const py=PY.get(ch); out.push(py?(pyToZhuyin(py)||py):ch); } return out.join(' ');
  }
  if (lang==='zh-CN'){
    const out=[]; for (const ch of text){ out.push(PY.get(ch)||ch); } return out.join(' ');
  }
  if (lang==='ko-KR') return hangulRoman(text);
  if (lang==='ja-JP') return kanaRoman(text);
  return text;
}

function fuzzyEq(a,b){
  if (!a || !b) return false;
  if (a===b) return true;
  const short=Math.min(a.length,b.length);
  if (short>=3 && (a.includes(b) || b.includes(a))) return true;
  const L=Math.max(a.length,b.length);
  const tol = L>=8?2 : L>=4?1 : 0;
  if (tol>0 && levenshtein(a,b)<=tol) return true;
  if (b.length>=3 && a.length>=b.length){
    for (let i=0;i+b.length<=a.length;i++){
      const w=a.slice(i,i+b.length);
      const t=b.length>=6?2:b.length>=4?1:0;
      if (levenshtein(w,b)<=t) return true;
    }
  }
  return false;
}

/* 音節序列比對（中文用）：以音節為單位，避免 gan⊂gang 這類子字串誤判 */
function containsSeq(big, small){
  if (small.length > big.length) return false;
  for (let i=0;i+small.length<=big.length;i++){
    let ok=true;
    for (let j=0;j<small.length;j++){ if (big[i+j]!==small[j]){ ok=false; break; } }
    if (ok) return true;
  }
  return false;
}
function seqMatch(a, b){
  if (!a || !b) return false;
  if (a===b) return true;
  const at=a.split(' ').filter(Boolean), bt=b.split(' ').filter(Boolean);
  if (!at.length || !bt.length) return false;
  if (at.join('')===bt.join('')) return true;                 // 去邊界後完全一致
  if (containsSeq(at,bt) || containsSeq(bt,at)) return true;   // 多唸字／雜訊
  return false;
}

/* 主比對：辨識文字 vs 目標 { gameName, gameLang, reading } */
function matchName(transcript, target){
  if (!target) return false;
  const lang = target.gameLang || 'zh-TW';
  const rd = (target.reading||'').trim();

  if (lang==='zh-TW' || lang==='zh-CN'){
    const tp = phonZh(transcript), gp = phonZh(target.gameName||'');
    if (seqMatch(tp, gp)) return true;                         // 唸對音（同音字＋台灣發音變體）
    if (rd){
      const gr = readingKeyZh(rd);
      if (gr){
        if (seqMatch(tp, gr)) return true;                     // 對手轉寫 vs 自訂注音／拼音
        const tr = readingKeyZh(transcript);
        if (tr && seqMatch(tr, gr)) return true;
      }
    }
    return false;
  }

  const tC = normalize(transcript), gC = normalize(target.gameName||'');
  if (gC && tC && fuzzyEq(tC, gC)) return true;                 // 字面
  const tP = phon(transcript, lang), gP = phon(target.gameName||'', lang);
  if (gP && tP && fuzzyEq(tP, gP)) return true;                 // 讀音（近音互通）
  if (rd){
    const gR = readingKey(rd, lang);
    if (gR){
      if (tP && fuzzyEq(tP, gR)) return true;
      const tR = readingKey(transcript, lang);
      if (tR && fuzzyEq(tR, gR)) return true;
    }
  }
  return false;
}

    }
  }, 6000);
} else {
  // 沒有設定 Firebase：仍可使用本機測試與麥克風測試
  initChat();
  S.uid = 'local-' + Math.random().toString(36).slice(2,8);
  if (S.avatar) S.avatarCache[S.uid]=S.avatar;
  document.getElementById('conn').classList.add('hidden');
  setTimeout(render, 0);
}

/* =========================================================
   房間流程
   ========================================================= */
async function createRoom(cfg){
  if (!S.uid) return;
  let code = roomCode(), tries=0;
  while (tries++ < 8){
    const snap = await get(ref(db, 'rooms/' + code));
    if (!snap.exists()) break;
    code = roomCode();
  }
  const room = {
    name: cfg.name, password: cfg.password || '',
    maxPlayers: cfg.maxPlayers, hostId: S.uid,
    state: 'waiting', languages: cfg.languages,
    answerTimeoutSec: cfg.answerTimeoutSec,
    gamesPer: cfg.gamesPer||0,
    createdAt: serverTimestamp(),
    players: { [S.uid]: newPlayer() }
  };
  await set(ref(db, 'rooms/' + code), room);
  await enterRoom(code);
  toast('房間已建立，房號 ' + code, 'ok');
}
function newPlayer(){
  return { nickname: S.nickname, gameName:'', gameLang:'', submitted:false, score:0, joinedAt: serverTimestamp() };
}

async function joinRoom(code){
  code = (code||'').toUpperCase().trim();
  if (!code) return;
  const snap = await get(ref(db, 'rooms/' + code));
  if (!snap.exists()){ toast('找不到這個房號', 'err'); return; }
  const room = snap.val();
  if (room.state !== 'waiting'){ toast('遊戲進行中，暫時無法加入', 'err'); return; }
  const count = room.players ? Object.keys(room.players).length : 0;
  if (count >= room.maxPlayers){ toast('房間人數已滿', 'err'); return; }
  if (room.password){
    const pw = prompt('這個房間需要密碼：');
    if (pw == null) return;
    if (pw !== room.password){ toast('密碼錯誤', 'err'); return; }
  }
  await set(ref(db, `rooms/${code}/players/${S.uid}`), newPlayer());
  await enterRoom(code);
}

async function enterRoom(code){
  S.roomId = code;
  S.claimedRound = -1;
  S.acts = new Set();
  const pRef = ref(db, `rooms/${code}/players/${S.uid}`);
  onDisconnect(pRef).remove();               // 斷線自動離場
  if (S.roomUnsub) S.roomUnsub();
  if (S.lobbyUnsub){ S.lobbyUnsub(); S.lobbyUnsub=null; }

  S.roomUnsub = onValue(ref(db, 'rooms/' + code), snap => {
    if (!snap.exists()){
      // 房間被關閉
      cleanupRoomState();
      toast('房間已關閉', 'err');
      render();
      return;
    }
    const room = snap.val();
    // 我已不在玩家名單（可能被清或斷線）→ 回大廳
    if (!room.players || !room.players[S.uid]){
      cleanupRoomState();
      render();
      return;
    }
    S.room = room;
    S.isHost = room.hostId === S.uid;
    if (S.micTest && room.state === 'playing'){ S.micTest = false; S.micTestListening = false; S.speech && S.speech.stop(); }

    // 房主遷移：若房主不在名單，選最早加入者接手
    if (!room.players[room.hostId]){
      const nh = expectedHostId(room);
      if (nh){
        runTransaction(ref(db, `rooms/${code}/hostId`), cur => {
          if (cur && room.players[cur]) return cur;
          return nh;
        });
      }
    }
    render();
  });
}

function cleanupRoomState(){
  S.speech && S.speech.stop();
  releaseMic();
  unsubscribeChat(); closeChat();
  if (S.roomUnsub){ S.roomUnsub(); S.roomUnsub=null; }
  S.roomId=null; S.room=null; S.isHost=false; S.lastKey=null; S.claimedRound=-1; S.acts=new Set();
  updateChatFab();
}

async function leaveRoom(){
  const code = S.roomId;
  S.speech && S.speech.stop();
  if (!code){ cleanupRoomState(); render(); return; }
  const pRef = ref(db, `rooms/${code}/players/${S.uid}`);
  try { onDisconnect(pRef).cancel(); } catch {}
  await remove(pRef);
  // 若沒人了 → 關閉房間
  const snap = await get(ref(db, `rooms/${code}/players`));
  if (!snap.exists() || Object.keys(snap.val()||{}).length===0){
    await remove(ref(db, 'rooms/' + code));
  }
  cleanupRoomState();
  render();
}

/* 開始遊戲（房主） */
async function startGame(){

  if (arr.length < 2){ toast('至少要 2 位玩家才能開始', 'err'); return; }
  const gameId = 'g' + serverNow();
  S.acts = new Set();
  const upd = { state:'playing', game:{ phase:'nameInput', gameId, currentRound:0 } };
  for (const p of arr){

}

/* 名字字元驗證：只允許該語言可發音的文字，擋掉符號、表情、亂碼 */
const NAME_ALLOWED = {
  'zh-TW': /^[\u3400-\u4DBF\u4E00-\u9FFF]+$/,               // 漢字
  'zh-CN': /^[\u3400-\u4DBF\u4E00-\u9FFF]+$/,
  'ja-JP': /^[\u3040-\u30FF\u4E00-\u9FFF\u3400-\u4DBFー]+$/, // 假名＋漢字
  'ko-KR': /^[\uAC00-\uD7A3\u1100-\u11FF\u3130-\u318F]+$/,   // 諺文
  'en-US': /^[A-Za-z][A-Za-z' -]*$/                          // 英文字母（可含空白、'、-）
};
function nameCharsValid(name, lang){
  const re = NAME_ALLOWED[lang];
  if (!re) return true;
  const test = (lang==='en-US') ? name.trim() : name.replace(/\s+/g,'');
  return re.test(test);
}
function nameCoreLen(name, lang){
  return (lang==='en-US' ? name.replace(/[^A-Za-z]/g,'') : name.replace(/\s+/g,'')).length;
}

/* 送出自己的名字 */
async function submitName(name, lang, reading){
  name = (name||'').trim();
  if (!lang){ toast(T('nameLangErr'), 'err'); return; }
  const len = nameCoreLen(name, lang);
  if (len < NAME_MIN || len > NAME_MAX){ toast(T('nameLenErr'), 'err'); return; }
  if (!nameCharsValid(name, lang)){
    toast(T('nameCharErr'), 'err'); return;
  }
  reading = (reading||'').trim() || computeReading(name, lang);
  if (S.local){
    const p = S.room.players[S.uid];
    if (p){ p.gameName=name; p.gameLang=lang; p.gameReading=reading; p.submitted=true; }
    render(); return;
  }
  await update(ref(db, `rooms/${S.roomId}/players/${S.uid}`), { gameName:name, gameLang:lang, gameReading:reading, submitted:true });
}

/* 喊中對方名字 → 搶下這回合（交易，先到先得） */
async function claimWin(){
  if (S.local){
    const g = S.room && S.room.game; if (!g || !g.matchup) return;
    const round = g.currentRound; if (S.claimedRound === round) return;
    const m = g.matchup;
    if (m.revealed && !m.winner && (S.uid===m.a || S.uid===m.b)){
      S.claimedRound = round; m.winner = S.uid; m.winnerAt = Date.now();
      S.speech && S.speech.stop(); render();
    }
    return;
  }
  if (!S.roomId || !S.room || !S.room.game) return;
  const round = S.room.game.currentRound;
  if (S.claimedRound === round) return;
  S.claimedRound = round;
  const mRef = ref(db, `rooms/${S.roomId}/game/matchup`);
  await runTransaction(mRef, m => {
    if (!m || !m.revealed || m.winner) return;         // 尚未翻牌或已有人搶到
    if (S.uid !== m.a && S.uid !== m.b) return;         // 只有對戰雙方能搶
    m.winner = S.uid;
    m.winnerAt = serverNow();
    return m;
  });
  S.speech && S.speech.stop();
}

/* 回等待室（任何人可觸發，把整間房重置） */
async function resetToWaiting(){
  if (!S.roomId || !S.room) return;
  const arr = playersArr(S.room);
  const upd = { state:'waiting', game:null };
  for (const p of arr){
    upd['players/'+p.id+'/gameName']='';
    upd['players/'+p.id+'/gameLang']='';
    upd['players/'+p.id+'/gameReading']='';
    upd['players/'+p.id+'/submitted']=false;
    upd['players/'+p.id+'/score']=0;
  }
  await update(ref(db, 'rooms/' + S.roomId), upd);
}

/* =========================================================
   房主主迴圈（由 100ms tick 驅動，狀態轉換用交易保護）
   ========================================================= */
function once(key, fn){
  if (S.acts.has(key)) return;
  S.acts.add(key);
  Promise.resolve(fn()).catch(e => { console.warn(e); S.acts.delete(key); });
}

function hostLoop(){
  if (!S.isHost || !S.room || S.room.state !== 'playing') return;
  const g = S.room.game; if (!g) return;
  const now = serverNow();
  const id = S.roomId, gid = g.gameId;

  if (g.phase === 'nameInput'){
    const arr = playersArr(S.room);
    if (arr.length >= 2 && arr.every(p => p.submitted)){
      once(gid+':reveal', async () => {
        const dur = revealDurationMs(arr.length);
        await update(ref(db, `rooms/${id}/game`), { phase:'reveal', revealEndAt: serverNow()+dur });
      });
    }
    return;
  }
  if (g.phase === 'reveal'){
    if (g.revealEndAt && now >= g.revealEndAt){
      once(gid+':prep', () => update(ref(db, `rooms/${id}/game`), { phase:'prep', prepEndAt: serverNow()+PREP_MS }));
    }
    return;
  }
  if (g.phase === 'prep'){
    if (g.prepEndAt && now >= g.prepEndAt){
      once(gid+':start', async () => {
        const ids = playersArr(S.room).map(p=>p.id);
        const matchups = buildMatchups(ids, S.room.gamesPer||0);
        const first = matchups[0];
        await update(ref(db, `rooms/${id}/game`), {
          phase:'matchup', matchups, totalRounds: matchups.length, currentRound:0,
          matchup:{ a:first.a, b:first.b, countdownEndAt: serverNow()+COUNTDOWN_MS, revealed:false, winner:null, scored:false }
        });
      });
    }
    return;
  }
  if (g.phase === 'matchup'){
    const m = g.matchup; if (!m) return;
    const round = g.currentRound;
    const players = S.room.players || {};
    const aOut = !players[m.a], bOut = !players[m.b];

    // 翻牌
    if (!m.revealed && now >= m.countdownEndAt){
      once(gid+':rev'+round, () => runTransaction(ref(db, `rooms/${id}/game/matchup`), mm => {
        if (!mm || mm.revealed) return;
        mm.revealed = true; mm.listenStartAt = serverNow();
        return mm;
      }));
      return;
    }
    if (m.revealed){
      const timeout = (S.room.answerTimeoutSec||30)*1000;
      // 有人離線 → 直接跳過本回合
      if (!m.winner && (aOut || bOut)){
        once(gid+':skip'+round, () => runTransaction(ref(db, `rooms/${id}/game/matchup`), mm => {
          if (!mm || mm.winner) return; mm.winner='none'; return mm;
        }));
      } else if (!m.winner && m.listenStartAt && now >= m.listenStartAt + timeout){
        once(gid+':to'+round, () => runTransaction(ref(db, `rooms/${id}/game/matchup`), mm => {
          if (!mm || mm.winner) return; mm.winner='none'; return mm;
        }));
      }
      // 計分（誰翻 scored=true 誰記分，只會有一人成功）
      if (m.winner && !m.scored){
        once(gid+':score'+round, async () => {
          const res = await runTransaction(ref(db, `rooms/${id}/game/matchup`), mm => {
            if (!mm || !mm.winner || mm.scored) return;
            mm.scored = true; mm.nextAt = serverNow()+RESOLVE_MS;
            return mm;
          });
          if (res.committed && res.snapshot.exists()){
            const w = res.snapshot.val().winner;
            if (w && w !== 'none'){
              await runTransaction(ref(db, `rooms/${id}/players/${w}/score`), sc => (sc||0)+1);
            }
          }
        });
      }
      // 前進下一回合
      if (m.winner && m.scored && m.nextAt && now >= m.nextAt){
        once(gid+':next'+round, () => runTransaction(ref(db, `rooms/${id}/game`), gg => {
          if (!gg || gg.currentRound !== round) return;   // 已前進則放棄
          const next = round + 1;
          if (next >= gg.totalRounds){ gg.phase='results'; gg.matchup=null; }
          else {
            const pair = gg.matchups[next];
            gg.currentRound = next;
            gg.matchup = { a:pair.a, b:pair.b, countdownEndAt: serverNow()+COUNTDOWN_MS, revealed:false, winner:null, scored:false };
          }
          return gg;
        }));
      }
    }
  }
}

/* 大廳：清掉沒有玩家的殘留房間（建立超過 15 秒者才清，避免誤刪剛建立的房） */
function lobbyCleanup(rooms){
  const now = serverNow();
  for (const [code, r] of Object.entries(rooms||{})){
    const count = r.players ? Object.keys(r.players).length : 0;
    const age = now - (typeof r.createdAt==='number'?r.createdAt:now);
    if (count === 0 && age > 15000){ remove(ref(db, 'rooms/' + code)).catch(()=>{}); }
  }
}
function subscribeLobby(){
  if (!FB_OK || S.lobbyUnsub) return;
  S.lobbyUnsub = onValue(ref(db, 'rooms'), snap => {
    S.lobbyRooms = snap.val() || {};
    lobbyCleanup(S.lobbyRooms);
    if (!S.roomId) render();
  });
}

/* =========================================================
   畫面
   ========================================================= */
const app = document.getElementById('app');

function routeGame(r){
  if (r.state === 'waiting') return 'wait';
  const g = r.game || {};
  if (g.phase === 'nameInput') return 'g-name';
  if (g.phase === 'reveal') return 'g-reveal';
  if (g.phase === 'prep') return 'g-prep';
  if (g.phase === 'results') return 'g-result';
  if (g.phase === 'matchup'){
    const m = g.matchup || {};
    return `g-duel:${g.currentRound}:${m.revealed?1:0}:${m.winner?('w'+m.winner):0}`;
  }
  return 'lobby';
}
function computeKey(){
  if (!S.uid) return 'boot';
  if (S.langPick) return 'lang';
  if (!S.nickname || S.editingNick) return 'gate';
  if (S.micTest) return 'mic-test';
  if (S.localSetup) return 'local-setup';
  if (S.local && S.room) return routeGame(S.room);
  if (!S.roomId || !S.room) return 'lobby';
  return routeGame(S.room);
}

function render(){
  try { document.getElementById('conn').classList.toggle('hidden', !FB_OK || S.connected || S.local || S.localSetup); } catch {}
  const key = computeKey();
  if (key !== S.lastKey){
    S.lastKey = key;
    S.speech && S.speech.stop();
    buildScreen(key);
  } else {
    patchScreen(key);
  }
  // 聊天室：只在線上房間出現；同時把房內玩家頭像抓進快取
  if (FB_OK && S.roomId && !S.local){
    subscribeChat(S.roomId);
    if (S.room && S.room.players) ensureAvatars(Object.keys(S.room.players));
  }
  updateChatFab();
}

function buildScreen(key){
  if (key === 'boot'){ app.innerHTML = brandHead() + '<div class="card center"><p class="dim">連線中…</p></div>'; return; }
  if (key === 'gate'){ screenGate(); return; }
  if (key === 'lang'){ screenLangPick(); return; }
  if (key === 'mic-test'){ screenMicTest(); return; }
  if (key === 'local-setup'){ screenLocalSetup(); return; }
  if (key === 'lobby'){ subscribeLobby(); screenLobby(); return; }
  if (key === 'wait'){ screenWaiting(); return; }
  if (key === 'g-name'){ screenNameInput(); return; }
  if (key === 'g-reveal'){ screenReveal(); return; }
  if (key === 'g-prep'){ screenPrep(); return; }
  if (key.startsWith('g-duel')){ screenDuel(); return; }
  if (key === 'g-result'){ screenResult(); return; }
}

function micTestHeard(){

  return shuffle(names.slice()).map(nm=>({name:nm, lang:botLang}));

function startLocalGame(){
  const count = Math.max(2, Math.min(8, S.localCount||4));
  const pool = botNamePool(S.localBotLang || 'zh-TW');
  const now = Date.now();
  const players = {};
  players['p0'] = { nickname: S.nickname||'你', gameName:'', gameLang:'', gameReading:'', submitted:false, score:0, joinedAt: now };
  for (let i=1;i<count;i++){
    const b = pool[(i-1) % pool.length];
    players['p'+i] = { nickname:'電腦'+i, gameName:b.name, gameLang:b.lang, gameReading: computeReading(b.name, b.lang), submitted:true, score:0, joinedAt: now+i };
  }
  if (!S._realUid) S._realUid = S.uid;
  S.uid = 'p0';
  S.local = true; S.localSetup = false;
  S.claimedRound = -1; S.lastKey = null;
  S.room = {
    name:'本機測試', maxPlayers:count, hostId:'p0', state:'playing',
    languages:{'zh-TW':true,'zh-CN':true,'en-US':true,'ja-JP':true,'ko-KR':true},
    answerTimeoutSec:30, gamesPer:(S.localGamesPer===undefined?2:S.localGamesPer), players,
    game:{ phase:'nameInput', gameId:'local'+now, currentRound:0 }
  };
  document.getElementById('conn').classList.add('hidden');
  ensureMic();   // 先取得麥克風授權，之後對戰不再跳視窗
  render();
}
function localExit(){
  S.speech && S.speech.stop();
  releaseMic();
  S.local=false; S.localSetup=false; S.room=null;
  if (S._realUid) S.uid = S._realUid;
  S.claimedRound=-1; S.lastKey=null;
  render();
}
function startLocalMatchups(){
  const g = S.room.game;
  const ids = Object.keys(S.room.players);
  const matchups = buildMatchups(ids, S.room.gamesPer||0);
  const first = matchups[0];
  g.phase='matchup'; g.matchups=matchups; g.totalRounds=matchups.length; g.currentRound=0;
  g.matchup={ a:first.a, b:first.b, countdownEndAt:Date.now()+COUNTDOWN_MS, revealed:false, winner:null, scored:false };
  S.claimedRound=-1;
  render();
}
function scheduleLocalBot(round){
  const g=S.room.game, m=g.matchup;
  const youIn = (m.a==='p0'||m.b==='p0');
  if (!youIn){
    const w = Math.random()<.5 ? m.a : m.b;
    const d = 700 + Math.random()*1600;
    setTimeout(()=>{ if(S.local && g.matchup===m && !m.winner){ m.winner=w; m.winnerAt=Date.now(); render(); } }, d);
  } else {
    const lvl = S.localBotLevel;
    if (lvl==='practice') return;          // 電腦不搶，你唸對就贏
    const bot = m.a==='p0' ? m.b : m.a;
    const ranges = { easy:[2800,4500], normal:[1600,2900], hard:[750,1500] };
    const [lo,hi] = ranges[lvl] || ranges.normal;
    const d = lo + Math.random()*(hi-lo);
    setTimeout(()=>{ if(S.local && g.matchup===m && !m.winner){ m.winner=bot; m.winnerAt=Date.now(); render(); } }, d);
  }
}
function localTick(){
  if (!S.local || !S.room || S.room.state!=='playing') return;
  const g = S.room.game; if(!g) return;
  const now = Date.now();
  const players = S.room.players;
  if (g.phase==='nameInput'){
    const arr = Object.values(players);
    if (arr.length>=2 && arr.every(p=>p.submitted)){
      g.phase='reveal'; g.revealEndAt = now + revealDurationMs(arr.length); render();
    }
    return;
  }
  if (g.phase==='reveal'){ if(now>=g.revealEndAt){ g.phase='prep'; g.prepEndAt=now+PREP_MS; render(); } return; }
  if (g.phase==='prep'){ if(now>=g.prepEndAt){ startLocalMatchups(); } return; }
  if (g.phase==='matchup'){
    const m=g.matchup; if(!m) return;
    if (!m.revealed && now>=m.countdownEndAt){
      m.revealed=true; m.listenStartAt=now; render(); scheduleLocalBot(g.currentRound); return;
    }
    if (m.revealed){
      const timeout=(S.room.answerTimeoutSec||30)*1000;
      if (!m.winner && now>=m.listenStartAt+timeout){ m.winner='none'; }
      if (m.winner && !m.scored){
        m.scored=true; m.nextAt=now+RESOLVE_MS;
        if (m.winner!=='none'){ players[m.winner].score=(players[m.winner].score||0)+1; }
        render();
      }
      if (m.winner && m.scored && m.nextAt && now>=m.nextAt){
        const round=g.currentRound, next=round+1;
        if (next>=g.totalRounds){ g.phase='results'; g.matchup=null; }
        else { const pr=g.matchups[next]; g.currentRound=next; g.matchup={a:pr.a,b:pr.b,countdownEndAt:Date.now()+COUNTDOWN_MS,revealed:false,winner:null,scored:false}; }
        S.claimedRound=-1; render();
      }
    }
  }
}

        <summary>${T('customReading')}</summary>
        <div style="padding:4px 2px 2px">
          <input id="greading" class="inp" maxlength="40" placeholder="${T('autoBlank')}" />
          <div class="hint">${T('customReadingHint')}</div>
        </div>
      </details>
      <button class="btn btn-primary" data-action="submitName" style="margin-top:16px">${T('submitName')}</button>
      <div class="progress" style="margin-top:16px">
        <div class="pbar"><i style="width:${Math.round(doneCount/arr.length*100)}%"></i></div>
        <span class="roundlbl num">${doneCount}/${arr.length} ${T('done')}</span>
      </div>
      ${S.local ? `<button class="btn btn-ghost" data-action="localExit" style="margin-top:12px">${T('exitTest')}</button>` : ''}
    </div>
  `;
  setTimeout(()=>$('#gname')?.focus(), 50);
  $('#gname')?.addEventListener('keydown', e=>{ if(e.key==='Enter') doSubmitName(); });
  $('#gname')?.addEventListener('input', updateReadingPlaceholder);
}
function updateReadingPlaceholder(){
  const nm = $('#gname')?.value || '';
  const gr = $('#greading');
  if (gr && !gr.value){
    const sug = computeReading(nm, S.selectedLang);
    gr.placeholder = sug ? (T('suggestLabel') + sug) : T('autoBlank');
  }
}

/* -------- 公開名字 -------- */
function screenReveal(){
  const r = S.room;
  const arr = playersArr(r).sort((a,b)=>(a.joinedAt||0)-(b.joinedAt||0));
  app.innerHTML = `
    ${brandHead()}
    <div class="card center">
      <div class="eyebrow">${T('memorizeThese')}</div>

      </div>
    </div>
    <div class="revealgrid" style="margin-top:14px">
      ${arr.map((p,i)=>`
        <div class="namecard" style="animation-delay:${i*60}ms">
          <div class="who">${avatarImg(p.id,'pav-xs')}${esc(p.nickname)}</div>
          <div class="gn">${esc(p.gameName)}</div>

/* -------- 準備 -------- */
function screenPrep(){
  app.innerHTML = `
    ${brandHead()}
    <div class="grow"></div>
    <div class="card center">
      <div class="eyebrow">${T('coverDone')}</div>
      <h1 class="h1" style="margin-bottom:6px">${T('prepReady')}</h1>
      <div class="ring">
        <svg width="150" height="150"><circle cx="75" cy="75" r="66" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="9"/>
          <circle id="prep-arc" cx="75" cy="75" r="66" fill="none" stroke="url(#pg)" stroke-width="9" stroke-linecap="round" stroke-dasharray="414.7" stroke-dashoffset="0"/>
          <defs><linearGradient id="pg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffb340"/><stop offset="1" stop-color="#ff5c8a"/></linearGradient></defs>
        </svg>
        <div class="rt num" id="prep-num">5</div>
      </div>
      <p class="dim">${T('prepMatching')}</p>
    </div>
    <div class="grow"></div>
  `;
}

/* -------- 對決 -------- */
function screenDuel(){
  const r = S.room, g = r.game, m = g.matchup;
  const players = r.players || {};
  const pa = players[m.a] || {}, pb = players[m.b] || {};
  const iAmA = S.uid === m.a, iAmB = S.uid === m.b;
  const iAmDuelist = iAmA || iAmB;
  const revealed = !!m.revealed;
  const round = g.currentRound, total = g.totalRounds;
  const arr = playersArr(r);

  // 對手（我要喊的人）
  const opp = iAmA ? pb : (iAmB ? pa : null);

  let stageHtml = `
    <div class="stage">
      <div class="spot"></div>
      <div class="plates">
        ${plateHtml('a', pa, revealed, m.winner===m.a)}
        <div class="vs">VS</div>
        ${plateHtml('b', pb, revealed, m.winner===m.b)}
      </div>
      ${!revealed ? `<div class="duelcount"><span id="dc-num">3</span></div>` : ''}
    </div>`;

  // 迷你名單（全員蓋牌，兩位登場者亮起）
  const mini = arr.map(p=>{
    const cls = p.id===m.a?'a':(p.id===m.b?'b':'');
    return `<div class="mini ${cls}">?</div>`;
  }).join('');

  let panel = '';
  if (m.winner){
    if (m.winner==='none'){
      panel = `<div class="winbanner none">${T('drawBanner')}</div>`;
    } else {
      const wp = players[m.winner] || {};
      const mePart = m.winner===S.uid ? T('isYouSuffix') : '';
      panel = `<div class="winbanner">🎉 ${esc(wp.nickname)}${T('saidFirstMid')}${esc(m.winner===m.a?pb.gameName:pa.gameName)}${T('saidFirstEnd')}${mePart}</div>`;
    }
  } else if (revealed && iAmDuelist){
    if (!SpeechDuel.supported()){
      panel = `<div class="speak"><div class="lead">${T('noVoiceBrowser')}</div><p class="dim">${T('useChrome')}</p></div>`;
    } else {
      panel = `
        <div class="speak">
          <div class="lead">${T('sayOpponent')}</div>
          <div class="target">${esc(opp.gameName)}</div>
          <div class="mic"><span class="dot"></span> ${T('micListening')}</div>
          <div class="transcript" id="ts"></div>
        </div>`;
    }
  } else if (revealed){
    panel = `<div class="spectate">👀 ${T('spectateHint')}</div>`;
  } else {
    panel = iAmDuelist
      ? `<div class="spectate" style="color:var(--amber)">${T('youUp')}</div>`
      : `<div class="spectate">${T('nextGroup')}</div>`;
  }

  app.innerHTML = `
    ${brandHead()}
    <div class="progress">
      <span class="roundlbl num">${T('roundPrefix')} ${round+1} / ${total}</span>
      <div class="pbar"><i style="width:${Math.round((round)/total*100)}%"></i></div>
      <button class="btn btn-ghost btn-sm" data-action="toggleScores" style="padding:7px 11px">${T('scores')}</button>
      ${S.local ? `<button class="btn btn-ghost btn-sm" data-action="localExit" style="padding:7px 11px">${T('leave')}</button>` : ''}
    </div>
    <div class="card" style="padding:16px">
      ${stageHtml}
      <div class="miniroster">${mini}</div>
      ${panel}
    </div>
    <div id="scorepanel" class="card hidden">${scoreListHtml(arr, r.hostId)}</div>
  `;

  // 翻牌後啟動語音（只有對戰雙方）
  if (revealed && !m.winner && iAmDuelist && SpeechDuel.supported() && S.claimedRound !== round){
    if (!S.speech) S.speech = new SpeechDuel();
    const oppTarget = { gameName: opp.gameName||'', gameLang: opp.gameLang||'zh-TW', reading: opp.gameReading||'' };
    S.speech.start(oppTarget.gameLang, (txt)=>matchName(txt, oppTarget), {
      onText: (txt)=>{ const el = $('#ts'); if (el) el.textContent = txt; },
      onMatch: ()=>{ claimWin(); }
    });
  }
}
function plateHtml(side, p, revealed, isWin){
  return `<div class="plate ${side} ${revealed?'revealed':''} ${isWin?'win':''} active">
    <div class="inner">
      <div class="pf pf-back">?</div>
      <div class="pf pf-front">
        <div class="tag">${esc(p.nickname||'')}</div>
        <div class="gn">${esc(p.gameName||'')}</div>
        <div class="lg">${LANGS[p.gameLang]||''}</div>
      </div>
    </div>
  </div>`;
}
function scoreListHtml(arr, hostId){
  const ranked = rankings(arr);
  return `<div class="eyebrow" style="margin-bottom:10px">${T('curScore')}</div>
    <div class="scorelist">
      ${ranked.map(p=>`
        <div class="scorerow ${p.rank===1&&(p.score||0)>0?'top':''}">
          <div class="rankn">${p.rank}</div>
          <div class="sn"><b>${esc(p.nickname)}${p.id===S.uid?T('youDot'):''}</b></div>
          <div class="scoreval num">${p.score||0}</div>
        </div>`).join('')}
    </div>`;
}

/* -------- 結算 -------- */
function screenResult(){
  const r = S.room;
  const arr = playersArr(r);
  const ranked = rankings(arr);
  const winners = ranked.filter(p=>p.rank===1);
  const medal = i => (i===1?'🥇':i===2?'🥈':i===3?'🥉':'');

  app.innerHTML = `
    ${brandHead()}
    <div class="card">
      <div class="winner-hero">
        <div class="crown">👑</div>
        <div class="wl">${winners.length>1?T('tiedChampion'):T('champion')}</div>
        <div class="wn">${winners.map(w=>esc(w.nickname)).join(' · ')}</div>
        <div class="dim" style="margin-top:6px">${winners.map(w=>esc(w.gameName)).filter(Boolean).join('、')}</div>
      </div>
      <div class="divider"></div>
      <div class="eyebrow" style="margin-bottom:10px">${T('finalRank')}</div>
      <div class="scorelist">
        ${ranked.map(p=>`
          <div class="scorerow ${p.rank===1?'top':''}">
            <div class="rankn">${p.rank}</div>
            <div class="sn"><b>${medal(p.rank)} ${esc(p.nickname)}${p.id===S.uid?T('youDot'):''}</b><small>${esc(p.gameName||'')}</small></div>
            <div class="scoreval num">${p.score||0}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="stack" style="margin-top:14px">
      ${S.local
        ? `<button class="btn btn-primary" data-action="localReplay">${T('playAgain')}</button>
           <button class="btn btn-ghost" data-action="localExit">${T('endReturn')}</button>`
        : `<button class="btn btn-primary" data-action="resetWaiting">${T('backToWaiting')}</button>
           <button class="btn btn-ghost" data-action="leaveRoom">${T('backToLobby')}</button>`}
    </div>
  `;
}

/* =========================================================
   局部更新（計時器等，不重建畫面以免動畫/麥克風中斷）
   ========================================================= */
function patchScreen(key){
  const r = S.room; if (!r) return;
  const g = r.game;
  if (key === 'g-name'){
    const arr = playersArr(r);
    const done = arr.filter(p=>p.submitted).length;
    const bar = $('#np-bar'), txt = $('#np-txt');
    if (bar) bar.style.width = Math.round(done/arr.length*100)+'%';
    if (txt) txt.textContent = `${done}/${arr.length}`;
  }
  else if (key === 'g-reveal' && g){
    const remain = Math.max(0, (g.revealEndAt||0) - serverNow());
    const total = revealDurationMs(playersArr(r).length);
    const bar = $('#rv-bar'), sec = $('#rv-sec');
    if (bar) bar.style.width = Math.max(0, Math.min(100, remain/total*100))+'%';
    if (sec) sec.textContent = Math.ceil(remain/1000)+'s';
  }
  else if (key === 'g-prep' && g){
    const remain = Math.max(0, (g.prepEndAt||0) - serverNow());
    const num = $('#prep-num'), arc = $('#prep-arc');
    if (num) num.textContent = Math.ceil(remain/1000);
    if (arc){ const frac = Math.max(0, Math.min(1, remain/PREP_MS)); arc.style.strokeDashoffset = (414.7*(1-frac)).toFixed(1); }
  }
  else if (key.startsWith('g-duel') && g && g.matchup && !g.matchup.revealed){
    const remain = Math.max(0, (g.matchup.countdownEndAt||0) - serverNow());
    const n = Math.ceil(remain/1000);
    const el = $('#dc-num');
    if (el) el.textContent = n<=0 ? '！' : n;
  }
}

/* =========================================================
   tick：驅動房主邏輯 + 更新計時
   ========================================================= */
setInterval(()=>{
  try { hostLoop(); } catch(e){ console.warn(e); }
  try { localTick(); } catch(e){ console.warn(e); }
  if (S.room){ patchScreen(S.lastKey); }
}, 100);

/* =========================================================
   事件
   ========================================================= */
app.addEventListener('click', e => {
  const t = e.target.closest('[data-action]');
  if (!t) return;
  const a = t.dataset.action;
  switch(a){
    case 'saveNick': doSaveNick(); break;
    case 'editNick': S.editingNick=true; S.lastKey=null; render(); break;
    case 'cancelNick': S.editingNick=false; S.lastKey=null; render(); break;
    case 'openLang': S.langPick=true; S.lastKey=null; render(); break;
    case 'pickAvatar': document.getElementById('avatar-file')?.click(); break;
    case 'langBack': S.langPick=false; S.lastKey=null; render(); break;
    case 'pickUiLang': S.uiLang=t.dataset.l; saveUiLang(S.uiLang); S.langPick=false; S.lastKey=null; render(); break;
    case 'openMicTest': S.micTest=true; S.micTestListening=false; S.lastKey=null; render(); break;
    case 'closeMicTest': S.micTest=false; S.micTestListening=false; S.speech&&S.speech.stop(); S.lastKey=null; render(); break;
    case 'openLocal': S.localSetup=true; S.lastKey=null; render(); break;
    case 'localBack': S.localSetup=false; S.lastKey=null; render(); break;
    case 'localCount': S.localCount = parseInt(t.dataset.n)||4; S.lastKey=null; render(); break;
    case 'localGames': S.localGamesPer = parseInt(t.dataset.g); if(isNaN(S.localGamesPer)) S.localGamesPer=0; S.lastKey=null; render(); break;
    case 'localBotLang': S.localBotLang = t.dataset.l; S.lastKey=null; render(); break;
    case 'localLevel': S.localBotLevel = t.dataset.lvl; S.lastKey=null; render(); break;
    case 'localStart': startLocalGame(); break;
    case 'localExit': localExit(); break;
    case 'localReplay': startLocalGame(); break;
    case 'pickGamesC': {
      document.querySelectorAll('#c-gamesper .pill').forEach(p=>p.setAttribute('aria-pressed', p===t?'true':'false'));
      S.createGamesPer = parseInt(t.dataset.g); if(isNaN(S.createGamesPer)) S.createGamesPer=0;
      break;
    }
    case 'pickGamesS': {
      document.querySelectorAll('#s-gamesper .pill').forEach(p=>p.setAttribute('aria-pressed', p===t?'true':'false'));
      break;
    }
    case 'toggleSettings': S.settingsOpen=!S.settingsOpen; S.lastKey=null; render(); break;
    case 'micTestLang': {
      S.micTestLang = t.dataset.lang;
      document.querySelectorAll('#mt-langs .pill').forEach(p=>p.setAttribute('aria-pressed', p.dataset.lang===S.micTestLang?'true':'false'));
      const el=$('#mt-reading'); const nm=$('#mt-name')?.value||''; if(el){ const s=computeReading(nm,S.micTestLang); el.textContent = nm?('讀音：'+(s||'—')):'　'; }
      if (S.micTestListening){ S.speech&&S.speech.stop(); S.micTestListening=false; setMicTestUI(false); }
      break;
    }
    case 'micTestToggle': micTestToggle(); break;
    case 'gotoCreate': if(!FB_OK){ toast('線上多人需先在檔案填入 firebaseConfig','err'); break; } buildScreenForce(screenCreate); break;
    case 'backLobby': render(); break;
    case 'createRoom': doCreateRoom(); break;
    case 'joinCode': if(!FB_OK){ toast('線上多人需先設定 Firebase','err'); break; } doJoinCode(); break;
    case 'joinRoom': {
      if(!FB_OK){ toast('線上多人需先設定 Firebase','err'); break; }
      const code = t.dataset.code;
      const r = S.lobbyRooms[code];
      if (r && r.players && Object.keys(r.players).length>=r.maxPlayers){ toast('房間人數已滿','err'); break; }
      joinRoom(code); break;
    }
    case 'toggleCreateLang': {
      const k = t.dataset.lang; S.createLangs[k] = !S.createLangs[k];
      t.setAttribute('aria-pressed', S.createLangs[k]?'true':'false'); break;
    }
    case 'toggleSettingLang': {
      const cur = t.getAttribute('aria-pressed')==='true';
      t.setAttribute('aria-pressed', cur?'false':'true'); break;
    }
    case 'saveSettings': doSaveSettings(); break;
    case 'copyCode': case 'shareCode': doCopyCode(); break;
    case 'startGame': startGame(); break;
    case 'leaveRoom': leaveRoom(); break;
    case 'pickLang': {
      S.selectedLang = t.dataset.lang;
      document.querySelectorAll('#n-langs .pill').forEach(p=>p.setAttribute('aria-pressed', p.dataset.lang===S.selectedLang?'true':'false'));
      const lh = $('#lang-hint'); if (lh) lh.textContent = LANGS[S.selectedLang]||'';
      updateReadingPlaceholder();
      break;
    }
    case 'submitName': doSubmitName(); break;
    case 'toggleScores': $('#scorepanel')?.classList.toggle('hidden'); break;
    case 'resetWaiting': resetToWaiting(); break;
  }
});

function buildScreenForce(fn){ S.lastKey='__force__'; fn(); }

function doSaveNick(){
  const v = ($('#nick')?.value||'').trim();
  if (!v){ toast(T('nickNeed'),'err'); return; }
  S.nickname = v.slice(0,12); saveNick(S.nickname);
  S.editingNick=false; S.lastKey=null; render();
}
function doCreateRoom(){
  const name = ($('#c-name')?.value||'').trim() || (S.nickname+' 的房間');
  const max = Math.max(2, Math.min(12, parseInt($('#c-max')?.value)||6));
  const timeout = Math.max(10, Math.min(60, parseInt($('#c-timeout')?.value)||30));
  const gpBtn = document.querySelector('#c-gamesper .pill[aria-pressed="true"]');
  const gamesPer = gpBtn ? (parseInt(gpBtn.dataset.g)||0) : (S.createGamesPer||0);
  const pw = ($('#c-pw')?.value||'').trim();
  const langs = {}; let any=false;
  document.querySelectorAll('#c-langs .pill').forEach(p=>{ const on=p.getAttribute('aria-pressed')==='true'; langs[p.dataset.lang]=on; if(on)any=true; });
  if (!any){ toast('至少要開放一種語言','err'); return; }
  createRoom({ name, password:pw, maxPlayers:max, languages:langs, answerTimeoutSec:timeout, gamesPer });
}
function doJoinCode(){
  const code = ($('#joincode')?.value||'').trim();
  if (!code){ toast('請輸入房號','err'); return; }
  joinRoom(code);
}
function doSaveSettings(){
  const name = ($('#s-name')?.value||'').trim() || S.room.name;
  const max = Math.max(2, Math.min(12, parseInt($('#s-max')?.value)|| S.room.maxPlayers));
  const timeout = Math.max(10, Math.min(60, parseInt($('#s-timeout')?.value)||30));
  const gpBtn = document.querySelector('#s-gamesper .pill[aria-pressed="true"]');
  const gamesPer = gpBtn ? (parseInt(gpBtn.dataset.g)||0) : (S.room.gamesPer||0);
  const pw = ($('#s-pw')?.value||'').trim();
  const langs = {}; let any=false;
  document.querySelectorAll('#s-langs .pill').forEach(p=>{ const on=p.getAttribute('aria-pressed')==='true'; langs[p.dataset.lang]=on; if(on)any=true; });
  if (!any){ toast('至少要開放一種語言','err'); return; }
  saveSettings({ name, password:pw, maxPlayers:max, languages:langs, answerTimeoutSec:timeout, gamesPer });
}
function doCopyCode(){
  const code = S.roomId; if(!code) return;
  const txt = `${T('brand')} — ${T('roomCode')}: ${code}`;
  if (navigator.clipboard){ navigator.clipboard.writeText(txt).then(()=>toast(T('toasts_copied')+' '+code,'ok')).catch(()=>toast(T('roomCode')+': '+code)); }
  else toast(T('roomCode')+': '+code);
}
function doSubmitName(){
  ensureMic();   // 在對決開始前先取得麥克風授權，之後不再跳權限視窗
  submitName($('#gname')?.value, S.selectedLang, $('#greading')?.value);
}

/* 離開頁面時嘗試移除自己（多一層保險） */
window.addEventListener('pagehide', ()=>{
  if (FB_OK && S.roomId && S.uid){
    try { remove(ref(db, `rooms/${S.roomId}/players/${S.uid}`)); } catch {}
  }
});

/* 立即渲染（未連上 Firebase 也先顯示畫面，避免空白） */
render();
</script>
